name: Mensagens Programadas do Bot

# O cron do GitHub Actions é fortemente limitado (throttling): apesar do "*/5",
# na prática dispara poucas vezes ao dia e quase nunca dentro da janela exata.
# Por isso o hook usa janela com "catch-up": a janela define só QUANDO o período
# pode começar; a partir daí o envio do período acontece na primeira execução
# que rodar, e a idempotência garante 1 envio por período por dia.
# Mantemos a grade densa (*/5) só para maximizar a chance de uma execução cair
# logo após o início de cada janela. Dias: segunda a sábado (1-6).

on:
  schedule:
    # Grade densa das 09:00 UTC (06:00 BRT) às 01:55 UTC (22:55 BRT), cobrindo
    # qualquer janela configurada no painel. O hook abre o período a partir do
    # início da janela (catch-up) e usa idempotência, então mesmo uma execução
    # atrasada entrega a mensagem do dia.
    - cron: "*/5 9-23 * * 1-6"   # 06:00–20:55 BRT
    - cron: "*/5 0-1 * * 2-6"    # 21:00–22:55 BRT (madrugada UTC = noite BRT do dia anterior)
  workflow_dispatch:
    inputs:
      periodo:
        description: "Forçar período (teste fora da janela)"
        required: false
        type: choice
        options: ["", "manha", "noite"]
      numero_teste:
        description: "Diagnóstico: enviar 1 msg de teste para este número (ex: 5544999596898)"
        required: false
        type: string

concurrency:
  group: mensagens-programadas
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Disparar lote de mensagens
        env:
          ENDPOINT: https://project--07528081-b16b-457c-89ce-f6cbc3387af7.lovable.app/api/public/hooks/mensagens-programadas
          SECRET: ${{ secrets.AI_BOT_WEBHOOK_SECRET }}
          PERIODO: ${{ github.event.inputs.periodo }}
          NUMERO_TESTE: ${{ github.event.inputs.numero_teste }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "AI_BOT_WEBHOOK_SECRET não configurado nos secrets do repo."
            exit 1
          fi

          # batch alto de propósito: o cron do GitHub é limitado e pode disparar
          # só 1x dentro de um período, então uma única execução precisa dar
          # conta de toda a equipe de encarregados (idempotência evita repetir).
          if [ -n "$NUMERO_TESTE" ]; then
            BODY="{\"testNumero\":\"$NUMERO_TESTE\"}"
          elif [ -n "$PERIODO" ]; then
            BODY="{\"batch\":10,\"periodo\":\"$PERIODO\"}"
          else
            BODY='{"batch":10}'
          fi

          RESP=$(curl -sS -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Bot-Secret: $SECRET" \
            -d "$BODY")
          echo "Resp: $RESP"
