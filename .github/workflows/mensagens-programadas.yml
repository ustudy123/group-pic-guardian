name: Mensagens Programadas do Bot

# AGENDAMENTO MOVIDO PARA O pg_cron (banco) — 16/07/2026.
#
# Motivo: o cron do GitHub Actions sofre throttling pesado. Apesar do "*/5",
# na prática disparava ~1x por hora e em horário imprevisível. Nos últimos dias
# programados o 1º disparo caiu 07:53, 09:09, 08:55, 08:08 e até 23:24 — ou seja,
# o "bom dia" saía fora da janela 07:15–08:15, às vezes de madrugada. Como cada
# execução manda para só 3 encarregados (batch), as mensagens ficavam pingando o
# dia inteiro (teve envio às 22:53).
#
# O pg_cron do Supabase dispara no horário certo, então a janela do painel volta
# a valer de verdade e o escalonamento (minuto-alvo por encarregado) funciona
# como foi desenhado.
#
# O job no banco chama este mesmo endpoint:
#   cron.schedule('mensagens-programadas', '*/5 10-11 * * *', ...)  -- 07:00–08:55 BRT
#
# O disparo manual abaixo (workflow_dispatch) continua servindo para teste e
# diagnóstico. Para religar o cron do GitHub, basta descomentar o bloco schedule.

on:
  # schedule:
  #   - cron: "*/5 9-23 * * 1-6"   # 06:00–20:55 BRT
  #   - cron: "*/5 0-1 * * 2-6"    # 21:00–22:55 BRT
  workflow_dispatch:
    inputs:
      periodo:
        description: "Forçar período (teste fora da janela)"
        required: false
        type: choice
        options: ["", "manha", "noite"]
      numero_teste:
        description: "Diagnóstico: enviar 1 msg de teste para este número (ex: 5544999596898)"
        required: false
        type: string

concurrency:
  group: mensagens-programadas
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Disparar lote de mensagens
        env:
          ENDPOINT: https://project--07528081-b16b-457c-89ce-f6cbc3387af7.lovable.app/api/public/hooks/mensagens-programadas
          SECRET: ${{ secrets.AI_BOT_WEBHOOK_SECRET }}
          PERIODO: ${{ github.event.inputs.periodo }}
          NUMERO_TESTE: ${{ github.event.inputs.numero_teste }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "AI_BOT_WEBHOOK_SECRET não configurado nos secrets do repo."
            exit 1
          fi

          # batch moderado: o hook escalona os envios dentro da janela (cada
          # encarregado tem um minuto-alvo próprio), então cada execução manda só
          # quem já "venceu" o horário. Mantemos um teto baixo por execução para os
          # disparos saírem espaçados (anti-spam); a idempotência evita repetir.
          # No teste forçado (periodo), usa batch alto para validar todos de uma vez.
          if [ -n "$NUMERO_TESTE" ]; then
            BODY="{\"testNumero\":\"$NUMERO_TESTE\"}"
          elif [ -n "$PERIODO" ]; then
            BODY="{\"batch\":10,\"periodo\":\"$PERIODO\"}"
          else
            BODY='{"batch":3}'
          fi

          RESP=$(curl -sS -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Bot-Secret: $SECRET" \
            -d "$BODY")
          echo "Resp: $RESP"
